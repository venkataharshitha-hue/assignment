<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Shopping</title>

<style>

.flex-container{
    display:flex;
    padding:20px;
    flex-wrap:wrap;
    flex-direction: row;
    align-items: center;
}

.flex-item{
    background-color: white;
    padding: 15px;
    width:220px;
    text-align: center;
    border-radius:10px;
    margin: 10px;
    color: black;
    border: 1px solid #ddd;
    transition: 0.3s;
}

.flex-item:hover{
    transform:scale(1.05);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.flex-item img{
    width:100%;
    height:150px;
    border-radius:10px;
    object-fit:cover;
}

.price{
    color:green;
    font-weight:bold;
}

button{
    background-color:orange;
    border-radius: 20px;
    cursor: pointer;
    padding:8px 12px;
    border:none;
    margin-top:8px;
}

button:hover{
    background-color:orange;
    color:white;
}

</style>
</head>

<body>

<div class="flex-container">
    <div class="flex-item">
    <img src="https://th.bing.com/th/id/OIP.7PWmvhGuFIwNbBXLj6SdTQHaFh?w=230&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
    <h3>LED TV</h3>

</div>
