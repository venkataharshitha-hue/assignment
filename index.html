        .flex-container{
    display:flex;
    padding:20px;
    flex-wrap:wrap;
    flex-direction: row;
    align-items: center;
}

.flex-item{
    background-color: white;
    padding: 15px;
    width:220px;
    text-align: center;
    border-radius:10px;
    margin: 10px;
    color: black;
    border: 1px solid #ddd;
    transition: 0.3s;
}

.flex-item:hover{
    transform:scale(1.05);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.flex-item img{
    width:100%;
    height:150px;
    border-radius:10px;
    object-fit:cover;
}

.price{
    color:green;
    font-weight:bold;
}

button{
    background-color:orange;
    border-radius: 20px;
    cursor: pointer;
    padding:8px 12px;
    border:none;
    margin-top:8px;
}

button:hover{
    background-color:orange;
    color:white;
}
    </style>
